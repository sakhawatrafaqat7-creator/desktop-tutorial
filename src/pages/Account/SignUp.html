<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 transition-all duration-300">

<nav class="bg-blue-600 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">Student Resource Hub</h1>

<div class="space-x-4 flex items-center">
<a href="../../../index.html">Home</a>
<a href="../about/about.html">About</a>
<a href="../contact/contact.html">Contact</a>
<a href="./SignUp.html">Sign Up</a>
<a href="../Account/signIn.html">Sign In</a>

<button onclick="toggleTheme()" class="bg-black px-3 py-1 rounded">🌙</button>
</div>
</nav>

<section class="p-10">
<form class="max-w-md mx-auto bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4">Create Account</h2>

<input type="text" placeholder="Full Name" class="w-full border p-2 mb-3 rounded">
<input type="email" placeholder="Email" class="w-full border p-2 mb-3 rounded">
<input type="password" placeholder="Password" class="w-full border p-2 mb-3 rounded">

<button class="bg-green-600 text-white px-4 py-2 rounded w-full">
Sign Up
</button>

<p class="mt-4">
Already have an account?
<a href="../Account/signIn.html" class="text-blue-600">Sign In</a>
</p>

</form>
</section>

<footer class="bg-blue-600 text-white text-center p-4">
<p>© 2026 Student Resource Hub</p>
</footer>

<script>
const toggleTheme = () => {
  document.body.classList.toggle("bg-gray-900");
  document.body.classList.toggle("text-white");
  localStorage.setItem("theme", document.body.className);
};
const loadTheme = () => {
  const saved = localStorage.getItem("theme");
  if (saved) document.body.className = saved;
};
loadTheme();
</script>

</body>
</html>
