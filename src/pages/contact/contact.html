<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 transition-all duration-300">

<!-- NAVBAR -->
<nav class="bg-blue-600 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">Student Resource Hub</h1>

<div class="space-x-4 flex items-center">
<a href="../../../index.html">Home</a>
<a href="../about/about.html">About</a>
<a href="./contact.html">Contact</a>
<a href="../Account/SignUp.html">Sign Up</a>
<a href="../Account/signIn.html">Sign In</a>

<button onclick="toggleTheme()" class="bg-black px-3 py-1 rounded">🌙</button>
</div>
</nav>

<!-- HEADER -->
<section class="p-10 text-center">
<h1 class="text-3xl font-bold mb-4">Contact Us</h1>
<p class="max-w-2xl mx-auto text-gray-600">
Have questions? Contact us below.
</p>
</section>

<!-- FORM -->
<section class="flex justify-center pb-16">
<form class="bg-white p-8 rounded shadow w-full max-w-md space-y-4">
<input placeholder="Full Name" class="w-full p-2 border rounded">
<input type="email" placeholder="Email" class="w-full p-2 border rounded">
<textarea rows="4" placeholder="Message" class="w-full p-2 border rounded"></textarea>

<button class="w-full bg-blue-600 text-white py-2 rounded">
Send Message
</button>
</form>
</section>

<footer class="bg-blue-600 text-white text-center p-4">
<p>© 2026 Student Resource Hub</p>
</footer>

<script>
const toggleTheme = () => {
  document.body.classList.toggle("bg-gray-900");
  document.body.classList.toggle("text-white");
  localStorage.setItem("theme", document.body.className);
};
const loadTheme = () => {
  const saved = localStorage.getItem("theme");
  if (saved) document.body.className = saved;
};
loadTheme();
</script>

</body>
</html>
